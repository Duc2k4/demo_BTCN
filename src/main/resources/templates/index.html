<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thông tin cá nhân</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #38bdf8);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 35px 30px;
      color: white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .avatar {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: white;
      color: #1e3a8a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      color: #dbeafe;
      margin-bottom: 25px;
    }

    .info {
      text-align: left;
      margin-top: 20px;
    }

    .info-item {
      background: rgba(255, 255, 255, 0.12);
      padding: 14px 16px;
      border-radius: 14px;
      margin-bottom: 12px;
      font-size: 17px;
    }

    .label {
      font-weight: bold;
      color: #bfdbfe;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #e0f2fe;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">TD</div>
    <h1>Tran Minh Duc</h1>
    <p class="subtitle">Thông tin cá nhân</p>

    <div class="info">
      <div class="info-item"><span class="label">Nhóm:</span> 6</div>
      <div class="info-item"><span class="label">SĐT:</span> 0363226006</div>
      <div class="info-item"><span class="label">Địa chỉ:</span> Ho Chi Minh</div>
    </div>

    <div class="footer">
      Cảm ơn bạn đã ghé thăm trang cá nhân
    </div>
  </div>
</body>
</html>
